name: Build and Push Docker Images

on:
  push:
    branches: [ "docker_build" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch
            type=ref,event=tag
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # 🔹 WEB
      - name: Build & push raisepon_web
        uses: docker/build-push-action@v5
        with:
          context: ./Dockerfiles/web
          push: true
          tags: |
            vtvelkov/raisepon_web:latest
            vtvelkov/raisepon_web:${{ github.sha }}

      # 🔹 DB
      - name: Build & push raisepon_db
        uses: docker/build-push-action@v5
        with:
          context: ./Dockerfiles/db
          push: true
          tags: |
            vtvelkov/raisepon_db:latest
            vtvelkov/raisepon_db:${{ github.sha }}

      # 🔹 FLYWAY
      - name: Build & push raisepon_flyway
        uses: docker/build-push-action@v5
        with:
          context: ./Dockerfiles/flyway
          push: true
          tags: |
            vtvelkov/raisepon_flyway:latest
            vtvelkov/raisepon_flyway:${{ github.sha }}

      # 🔹 RSYSLOG
      - name: Build & push rsyslog
        uses: docker/build-push-action@v5
        with:
          context: ./Dockerfiles/rsyslog
          push: true
          tags: |
            vtvelkov/rsyslog:latest
            vtvelkov/rsyslog:${{ github.sha }}